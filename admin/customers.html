<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Customers - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/themes.css">
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="admin-logo"><h2>FASHION<span>STORE</span></h2><p>Admin Panel</p></div>
            <nav class="admin-nav">
                <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="products.html"><i class="fas fa-box"></i> Products</a>
                <a href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a>
                <a href="customers.html" class="active"><i class="fas fa-users"></i> Customers</a>
                <a href="#" id="admin-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        <main class="admin-main">
            <div class="admin-header"><h1>Manage Customers</h1><div class="admin-user"><i class="fas fa-user-circle"></i><span>Administrator</span></div></div>
            <div class="customers-section">
                <h2>All Customers</h2>
                <div class="table-responsive">
                    <table id="customers-table">
                        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Orders</th><th>Total Spent</th><th>Joined</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Theme Switcher - 5 Themes -->
    <button class="theme-toggle-btn" id="theme-toggle-btn">
        <i class="fas fa-palette"></i>
    </button>
    <div class="theme-switcher" id="theme-switcher">
        <div class="theme-btn theme-default" data-theme="default" title="Luxury Gold"></div>
        <div class="theme-btn theme-blue" data-theme="blue" title="Ocean Blue"></div>
        <div class="theme-btn theme-green" data-theme="green" title="Forest Green"></div>
        <div class="theme-btn theme-orange" data-theme="orange" title="Sunset Orange"></div>
        <div class="theme-btn theme-purple" data-theme="purple" title="Purple Royale"></div>
    </div>

    <script src="../js/admin.js"></script>
    <script src="../js/themes.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Sync theme when admin customers page loads
            if (typeof syncThemeAcrossPages === 'function') {
                syncThemeAcrossPages();
            }
        });
    </script>
</body>
</html>
